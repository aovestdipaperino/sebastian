name: Deploy demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm package
        run: wasm-pack build sebastian-wasm --release --target web

      - name: Assemble site
        # The demo page lives at sebastian-wasm/demo/ and imports ../pkg/;
        # on Pages both land in the site root, so rewrite the import path.
        run: |
          mkdir -p site/pkg
          cp sebastian-wasm/pkg/sebastian_wasm.js sebastian-wasm/pkg/sebastian_wasm_bg.wasm site/pkg/
          sed 's|\.\./pkg/|./pkg/|' sebastian-wasm/demo/index.html > site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
