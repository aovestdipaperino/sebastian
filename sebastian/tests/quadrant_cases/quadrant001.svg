<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 500px; background-color: white;" viewBox="0 0 500 500" role="graphics-document document" aria-roledescription="quadrantChart"><style>#my-svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#552222;}#my-svg .error-text{fill:#552222;stroke:#552222;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#333333;stroke:#333333;}#my-svg .marker.cross{stroke:#333333;}#my-svg svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#my-svg p{margin:0;}#my-svg .node .neo-node{stroke:#9370DB;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#my-svg [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="main"><g class="quadrants"><g class="quadrant"><rect x="263" y="31" width="232" height="232" fill="#ECECFF"/><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="middle" text-anchor="middle" transform="translate(379, 147) rotate(0)">Do</text></g><g class="quadrant"><rect x="31" y="31" width="232" height="232" fill="#f1f1ff"/><text x="0" y="0" fill="#0e0e00" font-size="16" dominant-baseline="middle" text-anchor="middle" transform="translate(147, 147) rotate(0)">Schedule</text></g><g class="quadrant"><rect x="31" y="263" width="232" height="232" fill="#f6f6ff"/><text x="0" y="0" fill="#090900" font-size="16" dominant-baseline="middle" text-anchor="middle" transform="translate(147, 379) rotate(0)">Delegate</text></g><g class="quadrant"><rect x="263" y="263" width="232" height="232" fill="#fbfbff"/><text x="0" y="0" fill="#040400" font-size="16" dominant-baseline="middle" text-anchor="middle" transform="translate(379, 379) rotate(0)">Delete</text></g></g><g class="border"><line x1="30" y1="31" x2="496" y2="31" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="495" y1="32" x2="495" y2="494" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="30" y1="495" x2="496" y2="495" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="31" y1="32" x2="31" y2="494" style="stroke: rgb(199, 199, 241); stroke-width: 2;"/><line x1="263" y1="32" x2="263" y2="494" style="stroke: rgb(199, 199, 241); stroke-width: 1;"/><line x1="32" y1="263" x2="494" y2="263" style="stroke: rgb(199, 199, 241); stroke-width: 1;"/></g><g class="data-points"/><g class="labels"><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 5) rotate(0)">Urgent</text></g><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 5) rotate(0)">Not Urgent</text></g><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 379) rotate(-90)">Not Important</text></g><g class="label"><text x="0" y="0" fill="#131300" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 147) rotate(-90)">Important</text></g></g><g class="title"/></g></svg>